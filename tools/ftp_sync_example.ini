[FTP]
# LOCAL_DIRECTORY is overridden by --local-dir from upload_apk_to_ftp.bat
LOCAL_DIRECTORY = .
FTP_DIRECTORY = /downloads/
FTP_HOST = yourserver.com
FTP_USER = user
FTP_PASS = password

# up = local to FTP
DIRECTION = up

# Never delete remote files that are absent locally (additive upload)
NO_DELETE = true

CONCURRENT_UPLOADS_OR_DOWNLOADS = 1
